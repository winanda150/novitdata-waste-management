<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistem manajemen retribusi pelayanan angkut sampah Br. Dangin Jalan.">
    <title>NovitData - Retribusi Pelayanan Angkut Sampah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section id="halaman-login" class="halaman-login">
        <div class="halaman-login-container">
            <div class="login-brand">
                <i class="fas fa-database"></i>
                <h1>NovitData</h1>
                <p>Sistem Manajemen Retribusi Sampah</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan email Anda" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Masukkan password Anda"
                            required autocomplete="current-password">
                        <i class="fa-solid fa-eye" id="togglePassword"></i>
                    </div>
                </div>
                <div id="error-message" class="error-message"></div>
                <button type="submit" id="loginBtn">Login</button>
            </form>
        </div>
    </section>

    <!-- Popup Berhasil Login -->
    <div id="successPopup" class="popup-overlay">
        <div class="popup-content">
            <div class="checkmark-wrapper">
                <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                    <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
                    <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
                </svg>
            </div>
            <h2>Berhasil!</h2>
            <p>Anda berhasil login ke sistem</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
